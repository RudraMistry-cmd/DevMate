<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt++ | DevMate</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <main class="container">
        <header class="page-header">
            <a class="back-link" href="/">← Back to DevMate</a>
            <h1>Prompt++ | DevMate</h1>
            <p>Optimize prompts using your local AI model.</p>
        </header>

        <section class="input-section">
            <h2>Enter your prompt</h2>
            <textarea id="userPrompt" placeholder="Describe what you want AI to help you with..."></textarea>
            <div class="field-group">
                <label for="category">Category</label>
                <select id="category">
                    <option selected>Select your Category</option>
                    <option>General</option>
                    <option>Coding</option>
                    <option>Writing</option>
                    <option>Research</option>
                    <option>Image Generation</option>
                    <option>Resume & Career</option>
                    <option>Marketing</option>
                    <option>Email</option>
                    <option>Social Media</option>
                    <option>Business</option>
                </select>
            </div>
            <div class="button-row">
                <button onclick="optimizePrompt()" id="optimizeBtn">Optimize Prompt</button>
            </div>
        </section>

        <section class="output-section">
            <h2>Optimized Prompt</h2>
            <textarea id="optimizedPrompt" placeholder="Your optimized prompt will appear here..." readonly></textarea>
            <div class="field-group">
                <h3>Changes Made</h3>
                <div id="changes"></div>
            </div>
        </section>
    </main>
    <script src="/js/prompt.js"></script>
</body>
</html>
