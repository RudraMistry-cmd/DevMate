<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Readme++</title>
    <link rel="stylesheet" href="..\css\styles.css">
</head>
<body>
    <main class="container">
        <header>
            <a href="/">← Back to DevMate</a>
            <h1>Readme++ | DevMate</h1>
            <p>Create a clean project README structure in seconds.</p>
        </header>

        <section class="input-section">
            <h3>Project Name</h3>
            <input type="text" id="projectName" placeholder="Enter project name">

            <h3>Description</h3>
            <textarea id="description" placeholder="Describe your project"></textarea>

            <h3>Features</h3>
            <textarea id="features" placeholder="List key features"></textarea>

            <h3>Tech Stack</h3>
            <textarea id="techStack" placeholder="List technologies used"></textarea>

            <h3>Installation</h3>
            <textarea id="installation" placeholder="Add installation steps"></textarea>

            <h3>Usage</h3>
            <textarea id="usage" placeholder="Explain how to use it"></textarea>

            <h3>Future Improvements</h3>
            <textarea id="futureImprovements" placeholder="Mention future enhancements"></textarea>

            <h3>License</h3>
            <textarea id="license" placeholder="Add license information"></textarea>

            <button id="generateBtn">Generate README</button>
        </section>

        <section class="output-section">
            <h3>Output</h3>
            <textarea id="output" readonly placeholder="Generated README will appear here..."></textarea>
            <button id="copyBtn">Copy</button>
        </section>
    </main>
    <script src="..\js\readme.js"></script>
</body>
</html>
