<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API++</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <main class="container">
        <header class="page-header">
            <a class="back-link" href="/">← Back to DevMate</a>
            <h1>API++ | DevMate</h1>
            <p>Test API endpoints from the browser.</p>
        </header>

        <section class="input-section">
            <div class="field-group">
                <label for="apiUrl">URL</label>
                <input type="text" id="apiUrl" placeholder="https://example.com/api">

            <div class="field-group">
                <label for="methodSelect">Method</label>
                <select id="methodSelect">
                    <option value="GET">GET</option>
                    <option value="POST">POST</option>
                    <option value="PUT">PUT</option>
                    <option value="DELETE">DELETE</option>
                </select>
            </div>

            <div class="field-group">
                <label for="headersInput">Headers (optional)</label>
                <textarea id="headersInput" placeholder="{'Content-Type': 'application/json'}"></textarea>
            </div>

            <div class="field-group" id="bodySection">
                <label for="bodyInput">Body (optional)</label>
                <textarea id="bodyInput" placeholder="{\n  \"key\": \"value\"\n}"></textarea>
            </div>

            <div class="button-row">
                <button id="sendBtn" onclick="sendRequest()">Send Request</button>
            </div>
        </section>

        <section class="output-section">
            <h2>Response</h2>
            <div class="field-group">
                <p><strong>Status</strong>: <span id="statusText">Not sent</span></p>
            </div>
            <div class="field-group">
                <p><strong>Time</strong>: <span id="timeText">--</span></p>
            </div>
            <div class="field-group">
                <label for="responseBox">Response</label>
                <pre id="responseBox" class="response-box">{
    ...
}</pre>
            </div>
        </section>
    </main>

    <script src="/js/api.js"></script>
</body>
</html>
