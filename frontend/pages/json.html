<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON++ | DevMate</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <main class="container">
        <header class="page-header">
            <a class="back-link" href="/">← Back to DevMate</a>
            <h1>JSON++ | DevMate</h1>
            <p>Format, validate, and minify JSON quickly and reliably.</p>
        </header>

        <section class="input-section">
            <h2>Input</h2>
            <textarea id="jsonInput" rows="14" placeholder='{
  "name": "DevMate",
  "tools": ["Prompt++", "Regex++"]
}'></textarea>

            <div class="button-row">
                <button id="formatBtn">Format</button>
                <button id="minifyBtn">Minify</button>
                <button id="validateBtn">Validate</button>
                <button id="copyBtn">Copy</button>
                <button id="clearBtn">Clear</button>
            </div>
        </section>

        <section class="output-section">
            <h2>Output</h2>
            <textarea id="jsonOutput" rows="14" placeholder="Formatted JSON will appear here"></textarea>
        </section>
    </main>

    <script src="/js/json.js"></script>
</body>
</html>
