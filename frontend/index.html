<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevMate</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>DevMate</h1>
            <p>AI Developer Toolkit</p>
        </header>
        <div class="search-section">
            <input
                type="text"
                id="searchInput"
                placeholder="Search utilities..."
            >
            <p id="noResults" style="display:none;">
                No utility found.
            </p>
        </div>
        <section class="input-section">
            <h2>Featured</h2>
            <div class="utility-card" data-name="prompt">
                <a href="/prompt">
                    <h2>🧠 Prompt++</h2>
                </a>
            </div>
            <div class="utility-card" data-name="regex">
                <a href="/regex">
                    <h2>🔍 Regex++</h2>
                </a>
            </div>
            <div class="utility-card" data-name="readme">
                <a href="/readme">
                    <h2>📄 Readme++</h2>
                </a>
            </div>
            <div class="utility-card" data-name="api">
                <a href="/api-tool">
                    <h2>🌐 API++</h2>
                </a>
            </div>
        </section>

        <section class="output-section">
            <h2>Coming Soon</h2>
            <p>SQL++</p>
            <p>JWT++</p>
            <p>Docker++</p>
            <p>JSON++</p>
            <p>Git++</p>
            <p>...</p>
        </section>
    </main>
    <script src="/js/index.js"></script>
</body>
</html>
