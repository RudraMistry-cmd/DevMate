<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevMate</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/index.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>DevMate</h1>
            <p>AI Developer Toolkit</p>
            <div id="utilityStats"></div>
        </header>
        <div class="search-section">
            <input
                type="text"
                id="searchInput"
                placeholder="Search utilities..."
            >
            <p id="noResults" style="display:none;">
                No utility found.
            </p>
        </div>
        <div class="input-section" id="recentSection">
            <h2>🕒 Recently Used</h2>
            <div id="recentContainer"></div>
        </div>
        <div class="input-section" id="favoritesSection">
            <h2>⭐ Favorites</h2>
            <div id="favoritesContainer"></div>
        </div>

        <section class="input-section">
            <h2>Featured</h2>
            <div id="availableContainer"></div>
        </section>
        <section class="output-section">
            <h2>Coming Soon</h2>
            <div id="comingSoonContainer"></div>
        </section>
    </main>
    <script src="/js/utilities.js"></script>
    <script src="/js/index.js"></script>
</body>
</html>
