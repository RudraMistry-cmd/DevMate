<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API++</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <header>
            <a href="index.html">← Back to DevMate</a>
            <h1>API++ | DevMate</h1>
            <p>Test API endpoints from the browser.</p>
        </header>

        <section class="input-section">
            <h3>URL</h3>
            <input type="text" id="apiUrl" placeholder="https://example.com/api">

            <h3>Method</h3>
            <select id="methodSelect">
                <option value="GET">GET</option>
                <option value="POST">POST</option>
                <option value="PUT">PUT</option>
                <option value="DELETE">DELETE</option>
            </select>

            <h3>Headers (optional)</h3>
            <textarea id="headersInput" placeholder="{'Content-Type': 'application/json'}"></textarea>

            <div id="bodySection">
                <h3>Body (optional)</h3>
                <textarea id="bodyInput" placeholder="{\n  \"key\": \"value\"\n}"></textarea>
            </div>

            <button id="sendBtn" onclick="sendRequest()">Send Request</button>
        </section>

        <section class="output-section">
            <h3>Status</h3>
            <p id="statusText">Status : Not sent</p>

            <h3>Time</h3>
            <p id="timeText">Time : --</p>

            <h3>Response</h3>
            <pre id="responseBox" style="word-wrap: break-word; white-space: pre-wrap; overflow-wrap: break-word;">{
    ...
}</pre>
        </section>
    </main>

    <script src="api.js"></script>
</body>
</html>
